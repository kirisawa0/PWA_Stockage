<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="theme-color" content="#ffffff">

  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <link
    rel="stylesheet"
    href="./styles.css"
  >

  <title>Réserver un minibus</title>
</head>

<body>
  <header class="entete-page">
    <h1>Réserver une minibus</h1>

    <nav>
      <a href="./index.html">
        Accueil
      </a>

      <a href="./agendaminibus.html">
        Voir les réservations
      </a>
    </nav>
  </header>

  <main class="page-reservations">
    <form
      id="form-reservation-minibus"
      class="formulaire-reservation"
    >
      <label for="selection-minibus-reservation">
        Minibus
      </label>

      <select
        id="selection-minibus-reservation"
        required
      >
        <option value="">
          Sélectionner un minibus
        </option>
      </select>

      <label for="nom-reservation">
        Nom de la réservation
      </label>

      <input
        id="nom-reservation"
        type="text"
        required
      >

      <label for="responsable-reservation">
        Responsable
      </label>

      <input
        id="responsable-reservation"
        type="text"
        required
      >

      <label for="telephone-reservation">
        Téléphone
      </label>

      <input
        id="telephone-reservation"
        type="tel"
      >

      <label for="date-debut-reservation">
        Date et heure de départ
        </label>

        <input
        id="date-debut-reservation"
        type="datetime-local"
        required
        >

        <label for="date-fin-reservation">
        Date et heure de retour
        </label>

        <input
        id="date-fin-reservation"
        type="datetime-local"
        required
        >
      <label for="destination-reservation">
        Destination
        </label>

        <input
        id="destination-reservation"
        type="text"
        >

        <label for="nombre-passagers-reservation">
        Nombre de passagers
        </label>

        <input id="nombre-passagers-reservation" type="number" min="1" required>

      <label for="notes-reservation">
        Notes
      </label>

      <textarea
        id="notes-reservation"
        rows="4"
      ></textarea>

      <button
        id="bouton-enregistrer-reservation"
        type="submit"
      >
        Enregistrer la réservation
      </button>

      <p
        id="message-reservation"
        role="status"
      ></p>
    </form>
  </main>

  <script
    type="module"
    src="./js/reservationMinibus.js"
  ></script>
</body>

</html>
