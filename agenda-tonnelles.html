<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="theme-color" content="#ffffff">

  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <link
    rel="stylesheet"
    href="./styles.css"
  >

  <title>Agenda des tonnelles</title>
</head>

<body>
  <header class="entete-page">
    <h1>Agenda des tonnelles</h1>

    <nav>
      <a href="./index.html">
        Accueil
      </a>

      <a href="./reservation-tonnelles.html">
        Nouvelle réservation
      </a>
    </nav>
  </header>

  <main class="page-reservations">
    <label for="selection-tonnelle-agenda">
      Sélectionnez une tonnelle
    </label>

    <select id="selection-tonnelle-agenda">
      <option value="">
        Sélectionner une tonnelle
      </option>
    </select>

    <p
      id="message-agenda"
      role="status"
    ></p>

    <section
      id="agenda-tonnelle"
      class="agenda-tonnelle"
      hidden
    >
      <div class="navigation-agenda">
        <button
          id="bouton-mois-precedent"
          type="button"
          aria-label="Mois précédent"
        >
          ←
        </button>

        <h2 id="titre-mois-agenda"></h2>

        <button
          id="bouton-mois-suivant"
          type="button"
          aria-label="Mois suivant"
        >
          →
        </button>
      </div>

      <div class="entete-grille-agenda">
        <span>Lun</span>
        <span>Mar</span>
        <span>Mer</span>
        <span>Jeu</span>
        <span>Ven</span>
        <span>Sam</span>
        <span>Dim</span>
      </div>

      <div
        id="grille-agenda"
        class="grille-agenda"
      ></div>

      <section class="details-reservations">
        <h2>Réservations du mois</h2>

        <div id="liste-reservations-agenda"></div>
      </section>
    </section>
  </main>

  <script
    type="module"
    src="./js/agendaTonnelles.js"
  ></script>
</body>

</html>
