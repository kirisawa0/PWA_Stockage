<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <link
    rel="stylesheet"
    href="./styles.css"
  >
  <script type="module" src="./js/navigation.js"></script>

  <title>Gestion des minibus</title>
</head>

<body>
  <header>
    <h1>Gestion des minibus</h1>

    <a href="./agendaminibus.html">
      Agenda des minibus
    </a>

    <a href="./reservationMinibus.html">
      Reservation minibus
    </a>
  </header>

  <main>
    <button id="bouton-minibus" type="button">
      Ajouter un minibus
    </button>

    <div id="liste-minibus"></div>

    <dialog
      id="fenetre-ajout-minibus"
      class="fenetre-formulaire"
    >
      <form id="form-minibus">
        <h2>Ajouter un minibus</h2>

        <label for="immatriculation-minibus">
          Immatriculation
        </label>

        <input
          id="immatriculation-minibus"
          type="text"
          placeholder="AA-123-AA"
          required
        >

        <label for="nom-minibus">
          Nom
        </label>

        <input
          id="nom-minibus"
          type="text"
          placeholder="Minibus principal"
        >

        <label for="marque-minibus">
          Marque
        </label>

        <input
          id="marque-minibus"
          type="text"
        >

        <label for="modele-minibus">
          Modèle
        </label>

        <input
          id="modele-minibus"
          type="text"
        >

        <label for="capacite-minibus">
          Nombre de places
        </label>

        <input
          id="capacite-minibus"
          type="number"
          min="1"
          value="9"
          required
        >

        <label for="lieu-minibus">
          Lieu
        </label>

        <input
          id="lieu-minibus"
          type="text"
        >

        <div class="actions-formulaire">
          <button
            id="bouton-sauv-minibus"
            type="submit"
          >
            Sauvegarder
          </button>

          <button
            id="bouton-annuler-minibus"
            type="button"
          >
            Annuler
          </button>
        </div>
      </form>
    </dialog>
  </main>

  <script
    type="module"
    src="./js/minibus.js"
  ></script>
</body>

</html>
