<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="PWA vierge à personnaliser">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="stylesheet" href="./styles.css">

  <script type="module" src="./js/bodega.js"></script>
  <script type="module" src="./js/app.js"></script>

  <title>PWA de Stockage</title>
</head>
<body>
  <header>
    <h1>PWA de Stockage</h1>
  </header>

  <main>
    <p>Votre contenu apparaîtra ici.</p>
    <div id="liste_materiel"></div>
    <dialog
      id="fenetre-modification-bodega"
      class="fenetre-formulaire"
    >
      <form id="form-modification-bodega" >
      <input id="identifiant-modification-bodega" type="hidden">

      <label for="nom-modification-bodega">
        Nom
      </label>

      <input
        id="nom-modification-bodega"
        type="text"
        required
      >

      <label for="quantite-modification-bodega">
        Quantité
      </label>

      <input
        id="quantite-modification-bodega"
        type="number"
        min="0"
        required
      >

      <label for="lieu-modification-bodega">
        Lieu
      </label>

      <input
        id="lieu-modification-bodega"
        type="text"
      >

      <label for="etat-modification-bodega">
        État
      </label>

      <select id="etat-modification-bodega">
        <option value="disponible">Disponible</option>
        <option value="reservado">Réservé</option>
        <option value="agotado">Épuisé</option>
        <option value="dañado">Endommagé</option>
        <option value="retirado">Retiré</option>
      </select>

      <button id="bouton-sauv-modification-bodega" type="submit">
        Sauvegarder les modifications
      </button>

      <button id="bouton-annuler-modification-bodega" type="button">
        Annuler
      </button>
    </form>
  </dialog>

    <button id="bouton-bodega" type="button">
      Ajouter materiel
    </button>

    <dialog
      id="fenetre-ajout-bodega"
      class="fenetre-formulaire"
    >
      <form id="form-bodega" >
        <input id="nom-bodega" type="text" placeholder="Nom" required>

        <input
          id="quantite-bodega"
          type="number"
          min="0"
          placeholder="Quantite"
          required
        >

        <input
          id="lieu-bodega"
          type="text"
          placeholder="Ubicación"
        >

        <button id="bouton-sauv-bodega" type="submit">
          Sauvegarder
        </button>

        <button id="bouton-annuler-bodega" type="button">
          Annuler
        </button>
      </form>
    </dialog>

    

    <button id="installButton" hidden>
      Installer l'application
    </button>
    <a id="bouton-mouvements" type="button" href="./mouvements.html">
      mouvements
    </a>
    <a id="bouton-mouvements" type="button" href="./materiel.html">
      materiel
    </a>

    <a
      id="bouton-reserver-tonnelle"
      href="./reservation-tonnelles.html"
    >
      Réserver une tonnelle
    </a>

    <a
      id="bouton-agenda-tonnelles"
      href="./agenda-tonnelles.html"
    >
      Agenda des tonnelles
    </a>
    <a
      id="bouton-tonnelles"
      href="./tonnelles.html"
    >
      Gérer les tonnelles
    </a>

    <a
      id="bouton-reserver-minibus"
      href="./reservationMinibus.html"
    >
      Réserver une minibus
    </a>

    <a
      id="bouton-agenda-minibus"
      href="./agendaminibus.html"
    >
      Agenda des minibus
    </a>
    <a
      id="bouton-minibus"
      href="./minibus.html"
    >
      Gérer les minibus
    </a>
  </main>
  

  
</body>
</html>
