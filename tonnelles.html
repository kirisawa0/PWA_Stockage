<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <link
    rel="stylesheet"
    href="./styles.css"
  >

  <script type="module" src="./js/navigation.js"></script>

  <title>Gestion des tonnelles</title>
</head>

<body>
  <header>
    <h1>Gestion des tonnelles</h1>

    <a href="./reservation-tonnelles.html">
      Reserver une Tonnelle
    </a>

  </header>

  <main>
    <button id="bouton-tonnelle" type="button">
      Ajouter une tonnelle
    </button>

    <div id="liste-tonnelles"></div>

    <dialog
      id="fenetre-ajout-tonnelle"
      class="fenetre-formulaire"
    >
      <form id="form-tonnelle">
        <h2>Ajouter une tonnelle</h2>

        <label for="nom-tonnelle">
          Nom
        </label>

        <input
          id="nom-tonnelle"
          type="text"
          placeholder="Tonnelle principale"
          required
        >

        <label for="lieu-tonnelle">
          Lieu de stockage
        </label>

        <input
          id="lieu-tonnelle"
          type="text"
          placeholder="Entrepôt"
        >

        <div class="actions-formulaire">
          <button
            id="bouton-sauv-tonnelle"
            type="submit"
          >
            Sauvegarder
          </button>

          <button
            id="bouton-annuler-tonnelle"
            type="button"
          >
            Annuler
          </button>
        </div>
      </form>
    </dialog>
  </main>

  <script
    type="module"
    src="./js/tonelles.js"
  ></script>
</body>

</html>
